<!DOCTYPE html>
<html>
    <head>
        <title>Student Form</title>
    </head>
    <body>
        <h2>Enter Details</h2>

        {% if error %}
        <p style="color: red;">{{ error }}</p>
        {% endif %}

        <form action="/submit" method = "POST">
            Name: <br>
            <input type="text" name="name" required><br><br>

            Email:<br>
            <input type="email" name="email" required><br><br>
            <button type="submit">Submit</button>

        </form>
    </body>
</html>
